version: "3"
services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: lazyautomation:latest
    ports:
      - "${PORT:-5002}:3000"
    network_mode: host
    volumes:
      - app_public:/app/public:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges=true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.npm
    tty: true
    stdin_open: true
    cpus: 0.5
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  opencode-runner:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    image: opencode-runner:latest
    volumes:
      - app_public:/app/data
    ports:
      - "${OPENCODE_PORT:-5000}:5000"
    environment:
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      webapp:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges=true
    cpus: 0.75
    mem_limit: 1g

volumes:
  app_public:

networks:
  backend_network: